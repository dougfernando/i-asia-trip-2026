    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800&display=swap');

      /* ================================================================
         DESIGN TOKENS – Light (default)
      ================================================================ */
      :root {
        --primary:        #EC7000;
        --primary-hover:  #D06000;
        --primary-subtle: rgba(236, 112, 0, 0.10);
        --primary-border: rgba(236, 112, 0, 0.22);

        --text:           #050505;
        --text-secondary: #6F6F6F;
        --bg:             #FFFFFF;
        --surface:        #F5F7F8;
        --border:         #E2E5E8;
        --border-hover:   #B8BFC8;

        --shadow:    0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
        --shadow-md: 0 4px 20px rgba(0,0,0,0.09);

        --radius:    20px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --radius-xs:  8px;
      }

      /* Dark mode */
      [data-theme="dark"] {
        --primary:        #EC7000;
        --primary-hover:  #F08020;
        --primary-subtle: rgba(236, 112, 0, 0.12);
        --primary-border: rgba(236, 112, 0, 0.25);

        --text:           #EEF3FF;
        --text-secondary: #A6B3CC;
        --bg:             #0B1220;
        --surface:        rgba(255, 255, 255, 0.055);
        --border:         rgba(238, 243, 255, 0.11);
        --border-hover:   rgba(238, 243, 255, 0.22);

        --shadow:    0 4px 20px rgba(0,0,0,0.35);
        --shadow-md: 0 8px 32px rgba(0,0,0,0.50);
      }

      /* ================================================================
         BASE
      ================================================================ */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font: 16px/1.5 'Inter', -apple-system, system-ui, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      [data-theme="dark"] body {
        background:
          radial-gradient(1600px 900px at 15% -10%, rgba(236,112,0,0.07), transparent 65%),
          var(--bg);
        background-attachment: fixed;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px 16px 40px;
      }
      .wrap { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }

      /* ================================================================
         HERO
      ================================================================ */
      .hero {
        position: relative;
        border-radius: var(--radius);
        padding: 16px 20px;
        background: var(--surface);
        border: 1px solid var(--border);
        overflow: hidden;
      }
      /* Diagonal cyan accent – right side */
      .hero::before {
        content: '';
        position: absolute;
        top: 0; right: 0;
        width: 160px; height: 100%;
        background: linear-gradient(125deg, transparent 35%, var(--primary-subtle) 100%);
        pointer-events: none;
      }
      .hero::after {
        content: '';
        position: absolute;
        top: -30px; right: 28px;
        width: 3px;
        height: calc(100% + 60px);
        background: var(--primary);
        transform: skewX(-14deg);
        opacity: 0.55;
        pointer-events: none;
      }
      [data-theme="dark"] .hero { background: rgba(255,255,255,0.04); }

      .toprow {
        display: flex;
        align-items: center;
        gap: 16px;
        justify-content: space-between;
        position: relative;
        z-index: 1;
      }
      .brand {
        display: flex;
        flex-direction: row;
        gap: 20px;
        min-width: 0;
        flex: 1;
        align-items: center;
      }
      .logos {
        display: flex;
        gap: 16px;
        align-items: center;
        flex-wrap: nowrap;
      }
      .logos .l { height: 28px; display: inline-flex; align-items: center; }
      .logos svg { height: 28px; width: auto; }

      .title {
        border-left: 2.5px solid var(--primary);
        padding-left: 16px;
      }
      .title h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: -0.4px;
        line-height: 1.15;
        color: var(--text);
      }
      .title .sub {
        margin-top: 3px;
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.1px;
      }
      .actions {
        position: relative;
        display: flex;
        gap: 10px;
        align-items: center;
        z-index: 1;
      }
      .heroArt { display: none; }

      /* ================================================================
         BUTTONS
      ================================================================ */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 9px 16px;
        border-radius: var(--radius-sm);
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font: 700 14px/1 'Inter', system-ui, sans-serif;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      }
      .btn:hover { border-color: var(--border-hover); box-shadow: var(--shadow); }
      .btn:active { transform: scale(0.97); }
      .btn svg { width: 18px; height: 18px; }

      #themeBtn {
        padding: 7px;
        border-radius: var(--radius-xs);
        background: transparent;
        border: 1px solid var(--border);
      }
      #themeBtn:hover { background: var(--surface); }
      #themeBtn svg { width: 16px; height: 16px; opacity: 0.65; display: block; }

      /* ================================================================
         BOTTOM NAV
      ================================================================ */
      .tabs {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-top: 1px solid var(--border);
        z-index: 9000;
        padding-bottom: env(safe-area-inset-bottom);
      }
      [data-theme="dark"] .tabs {
        background: rgba(11, 18, 32, 0.92);
      }
      .seg {
        display: flex;
        justify-content: space-around;
        padding: 8px 12px;
        max-width: 600px;
        margin: 0 auto;
      }
      .seg button {
        appearance: none;
        border: none;
        background: transparent;
        color: var(--text-secondary);
        padding: 6px 8px;
        border-radius: var(--radius-sm);
        font: 600 12px/1 'Inter', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        flex: 1;
        transition: color 0.15s, background 0.15s;
      }
      .seg button svg {
        width: 22px; height: 22px;
        transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
      }
      .seg button:hover { background: var(--surface); }
      .seg button[aria-selected="true"] { color: var(--primary); }
      .seg button[aria-selected="true"] svg {
        transform: translateY(-2px) scale(1.08);
      }

      /* ================================================================
         PANELS
      ================================================================ */
      .panel {
        margin-top: 12px;
        border-radius: var(--radius);
        background: var(--bg);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      .panelHeader {
        padding: 15px 20px 13px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }
      .panelHeader h2 {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 9px;
      }
      /* Diagonal accent bar before panel title */
      .panelHeader h2::before {
        content: '';
        display: inline-block;
        width: 4px;
        height: 16px;
        background: var(--primary);
        border-radius: 2px;
        transform: skewX(-13deg);
        flex-shrink: 0;
      }
      .panelHeader .right {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
      }

      /* ================================================================
         INPUT / SEARCH
      ================================================================ */
      .input {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      .input:focus-within {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px var(--primary-subtle);
      }
      .input input {
        width: 100%;
        border: 0; outline: none;
        background: transparent;
        color: inherit;
        font: 500 14px/1 'Inter', system-ui, sans-serif;
      }
      .input input::placeholder { color: var(--text-secondary); }
      .input svg { width: 16px; height: 16px; color: var(--text-secondary); flex-shrink: 0; }

      .content { padding: 16px 18px; }

      /* ================================================================
         FILTER PILLS
      ================================================================ */
      .filters {
        display: flex;
        flex-wrap: nowrap;
        gap: 8px;
        margin-bottom: 14px;
        overflow-x: auto;
        overflow-y: hidden;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
        padding-bottom: 2px;
      }
      .filters::-webkit-scrollbar { display: none; }
      .pill {
        flex-shrink: 0;
        white-space: nowrap;
        padding: 5px 13px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text-secondary);
        font: 600 12px/1 'Inter', system-ui, sans-serif;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }
      .pill:hover { border-color: var(--primary); color: var(--primary); }
      .pill[data-on="true"] {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      [data-theme="dark"] .pill[data-on="true"] { color: #050505; }

      /* ================================================================
         ITINERARY GRID
      ================================================================ */
      .grid { display: grid; gap: 10px; }

      .day {
        border-radius: var(--radius-md) 2px var(--radius-md) var(--radius-md);
        border: 1px solid var(--border);
        background: var(--bg);
        overflow: hidden;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .day:hover {
        border-color: var(--primary-border);
        box-shadow: 0 4px 16px var(--primary-subtle);
      }
      .dayTop {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        padding: 14px;
        cursor: pointer;
      }
      .badgeDate {
        flex: 0 0 auto;
        min-width: 54px;
        padding: 8px 10px;
        border-radius: var(--radius-xs);
        background: var(--primary-subtle);
        border: 1px solid var(--primary-border);
        text-align: center;
      }
      .badgeDate .d {
        font: 800 13px/1 'Inter', system-ui, sans-serif;
        color: var(--primary-hover);
        display: block;
      }
      .badgeDate .c {
        margin-top: 3px;
        font: 600 10px/1 'Inter', system-ui, sans-serif;
        color: var(--text-secondary);
        display: block;
      }
      .dayMain { min-width: 0; flex: 1; }
      .dayMain .t {
        font: 700 14px/1.4 'Inter', system-ui, sans-serif;
        color: var(--text);
      }
      .dayMain .theme {
        font: 500 11px/1.3 'Inter', system-ui, sans-serif;
        color: var(--primary);
        font-style: italic;
        margin-top: 2px;
        opacity: 0.85;
      }
      .dayMain .logistics {
        font: 400 12px/1.4 'Inter', system-ui, sans-serif;
        color: var(--text-secondary);
        margin-top: 5px;
      }
      .tagrow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .tag {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-secondary);
        font: 600 11px/1 'Inter', system-ui, sans-serif;
      }
      .tag svg { width: 13px; height: 13px; }

      .dayBody {
        display: none;
        padding: 0 14px 14px;
        color: var(--text-secondary);
      }
      .day[data-open="true"] .dayBody {
        display: block;
        animation: slideDown 0.2s ease;
      }
      @keyframes slideDown {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .kv { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
      .k {
        padding: 7px 12px;
        border-radius: var(--radius-sm);
        background: var(--surface);
        border: 1px solid var(--border);
        font: 600 13px/1 'Inter', system-ui, sans-serif;
        color: var(--text);
      }
      .k span { color: var(--text-secondary); margin-right: 7px; }

      .discussion {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }
      .discussionTitle {
        margin: 0;
        font: 700 12px/1 'Inter', system-ui, sans-serif;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.4px;
      }
      .discussionCompany {
        padding: 12px 13px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: var(--surface);
      }
      .discussionCompany h4 {
        margin: 0;
        font: 700 13px/1.3 'Inter', system-ui, sans-serif;
        color: var(--text);
      }
      .discussionCompany .focus {
        margin-top: 4px;
        font: 500 12px/1.45 'Inter', system-ui, sans-serif;
        color: var(--text-secondary);
      }
      .discussionTopics {
        margin: 9px 0 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 6px;
      }
      .discussionTopics details {
        border-top: 1px solid var(--border);
        padding-top: 7px;
      }
      .discussionTopics details:first-child {
        border-top: 0;
        padding-top: 0;
      }
      .discussionTopics summary {
        cursor: pointer;
        font: 600 12px/1.4 'Inter', system-ui, sans-serif;
        color: var(--text);
      }
      .discussionTopics summary::marker { color: var(--primary); }
      .discussionTopics p {
        margin: 5px 0 0 16px;
        font: 400 12px/1.5 'Inter', system-ui, sans-serif;
        color: var(--text-secondary);
      }

      /* ================================================================
         COMPANY & CITY CARDS
      ================================================================ */
      .cards { display: grid; gap: 12px; }
      .card {
        border-radius: var(--radius-md) 2px var(--radius-md) var(--radius-md);
        border: 1px solid var(--border);
        background: var(--bg);
        padding: 16px;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      }
      .card:hover {
        border-color: var(--primary-border);
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }
      .card h3 {
        margin: 0;
        font: 700 15px/1.3 'Inter', system-ui, sans-serif;
        color: var(--text);
      }
      .card p {
        margin: 8px 0 0;
        color: var(--text-secondary);
        font: 400 13px/1.55 'Inter', system-ui, sans-serif;
      }
      .card .why {
        margin-top: 12px;
        padding: 10px 12px 10px 11px;
        border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        background: var(--primary-subtle);
        border: 1px solid var(--primary-border);
        border-left: 3px solid var(--primary);
        font: 600 12px/1.5 'Inter', system-ui, sans-serif;
        color: var(--text);
      }

      /* ================================================================
         TABLES
      ================================================================ */
      .table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        font: 400 13px/1.5 'Inter', system-ui, sans-serif;
        overflow: hidden;
        background: var(--bg);
      }
      .table th, .table td { padding: 11px 14px; text-align: left; }
      .table th {
        font: 700 11px/1 'Inter', system-ui, sans-serif;
        color: var(--text-secondary);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        letter-spacing: 0.4px;
        text-transform: uppercase;
      }
      .table tr + tr td { border-top: 1px solid var(--border); }
      .table td { color: var(--text); font-weight: 500; }

      /* ================================================================
         SECTION SUB-LABELS (logistics)
      ================================================================ */
      .sectionLabel {
        margin: 0 0 10px;
        font: 700 12px/1 'Inter', system-ui, sans-serif;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sectionLabel::before {
        content: '';
        display: inline-block;
        width: 3px; height: 13px;
        background: var(--primary);
        border-radius: 2px;
        transform: skewX(-13deg);
        flex-shrink: 0;
      }

      /* ================================================================
         COMPANY LINKS (itinerary → companies tab)
      ================================================================ */
      .co-link {
        background: none;
        border: none;
        padding: 0;
        color: var(--primary);
        font: inherit;
        cursor: pointer;
        text-decoration: underline;
        text-decoration-style: dotted;
        text-underline-offset: 2px;
        transition: color 0.15s;
      }
      .co-link:hover { color: var(--primary-hover); }
      @keyframes coHighlight {
        0%   { box-shadow: none; }
        20%  { box-shadow: 0 0 0 3px var(--primary); }
        100% { box-shadow: none; }
      }
      .co-highlight { animation: coHighlight 1.4s ease; }

      /* ================================================================
         RESPONSIVE
      ================================================================ */
      @media (min-width: 900px) {
        .grid  { grid-template-columns: repeat(2, 1fr); }
        .cards { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 768px) {
        .wrap { padding: 12px 12px 40px; }
        .hero { padding: 12px 16px; border-radius: 16px; }
        .brand { gap: 12px; }
        .logos .l, .logos svg { height: 22px; }
        .title { padding-left: 12px; }
        .title h1 { font-size: 15px; }
        .title .sub { font-size: 11px; }
      }
    </style>
    </style>
  </head>

    <script>
      // ============================================================================
      // INITIALIZATION & RENDERING LOGIC
      // ============================================================================

      // Populate UI with config text
      document.getElementById("pageTitle").textContent = CONFIG.app.title;
      document.getElementById("pageSubtitle").textContent = CONFIG.app.subtitle;
      document.getElementById("tabItineraryLabel").textContent =
        CONFIG.tabs.itinerary;
      document.getElementById("tabCompaniesLabel").textContent =
        CONFIG.tabs.companies;
      document.getElementById("tabCitiesLabel").textContent =
        CONFIG.tabs.cities;

      const ICON = {
        flight: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9L2 14v2l8-2.5V19l-2 1.5V22l3-1 3 1v-1.5L13 19v-5.5L21 16Z"/></svg>`,
        rail: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 2c-4 0-8 .8-8 5v9a3 3 0 0 0 3 3l-2 2v1h2l2-2h10l2 2h2v-1l-2-2a3 3 0 0 0 3-3V7c0-4.2-4-5-8-5Zm-6 7h12v5H6V9Zm2 10a1 1 0 1 1 0-2a1 1 0 0 1 0 2Zm8 0a1 1 0 1 1 0-2a1 1 0 0 1 0 2Z"/></svg>`,
        business: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M10 3h4a2 2 0 0 1 2 2v2h4a2 2 0 0 1 2 2v3H2v-3a2 2 0 0 1 2-2h4V5a2 2 0 0 1 2-2Zm0 4h4V5h-4v2Zm14 9v5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-5h10v2h4v-2h10Z"/></svg>`,
        free: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 22a10 10 0 1 1 10-10a10 10 0 0 1-10 10Zm1-17h-2v6l5 3l1-1.7l-4-2.3V5Z"/></svg>`,
        breakout: `<svg viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h16v10H5.2L4 15.2V4Zm2 2v6h12V6H6Zm-2 14v-2h16v2H4Z"/></svg>`,
      };

      function iconFor(tag) {
        if (tag === "Flight") return ICON.flight;
        if (tag === "Rail") return ICON.rail;
        if (tag === "Business") return ICON.business;
        if (tag === "Free Time") return ICON.free;
        if (tag === "Breakout") return ICON.breakout;
        return "";
      }

      // Utilities
      function slugify(s) {
        return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
      }

      function goToCompany(slug) {
        setTab('btn-companies');
        setTimeout(() => {
          const el = document.getElementById('co-' + slug);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            el.classList.add('co-highlight');
            setTimeout(() => el.classList.remove('co-highlight'), 1500);
          }
        }, 80);
      }

      const COMPANY_MAP = CONFIG.data.companies
        .map(c => ({ name: c.name, slug: slugify(c.name) }))
        .sort((a, b) => b.name.length - a.name.length);

      function linkifyCompanies(text) {
        let result = escapeHtml(text);
        for (const { name, slug } of COMPANY_MAP) {
          const esc = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          result = result.replace(new RegExp(esc, 'g'),
            `<button class="co-link" onclick="goToCompany('${slug}')">${name}</button>`);
        }
        return result;
      }

      function discussionText(points) {
        return (points || [])
          .map((p) =>
            [
              p.company,
              p.label,
              p.focus,
              ...(p.topics || []).flatMap((t) => [t.title, t.justification]),
            ].join(" "),
          )
          .join(" ");
      }

      function renderDiscussion(points) {
        if (!points || !points.length) return "";
        const companyBlocks = points.map((p) => {
          const label = p.label ? `: ${escapeHtml(p.label)}` : "";
          const topics = (p.topics || []).map((t) => `
            <li>
              <details>
                <summary>${escapeHtml(t.title)}</summary>
                <p>${escapeHtml(t.justification)}</p>
              </details>
            </li>
          `).join("");

          return `
            <section class="discussionCompany">
              <h4>${linkifyCompanies(p.company)}${label}</h4>
              <div class="focus">${escapeHtml(p.focus)}</div>
              <ul class="discussionTopics">${topics}</ul>
            </section>
          `;
        }).join("");

        return `
          <div class="discussion">
            <h3 class="discussionTitle">Discussion Points</h3>
            ${companyBlocks}
          </div>
        `;
      }

      // Theme
      const root = document.documentElement;
      const savedTheme = localStorage.getItem("app_theme") || "light";
      root.setAttribute("data-theme", savedTheme);
      document.getElementById("themeBtn").addEventListener("click", () => {
        const now =
          root.getAttribute("data-theme") === "light" ? "dark" : "light";
        root.setAttribute("data-theme", now);
        localStorage.setItem("app_theme", now);
      });

      // Tabs
      const tabs = [
        { btn: "btn-itinerary", panel: "tab-itinerary" },
        { btn: "btn-companies", panel: "tab-companies" },
        { btn: "btn-cities", panel: "tab-cities" },
        { btn: "btn-logistics", panel: "tab-logistics" },
      ];
      function setTab(activeBtnId) {
        for (const t of tabs) {
          const btn = document.getElementById(t.btn);
          const panel = document.getElementById(t.panel);
          const on = t.btn === activeBtnId;
          btn.setAttribute("aria-selected", on ? "true" : "false");
          panel.hidden = !on;
        }
        document.querySelector('.wrap').scrollIntoView({ behavior: 'smooth' });
      }
      for (const t of tabs)
        document
          .getElementById(t.btn)
          .addEventListener("click", () => setTab(t.btn));

      // Date formatting
      function formatDate(dateStr) {
        const date = new Date(dateStr + "T00:00:00");
        const months = [
          "Jan",
          "Feb",
          "Mar",
          "Apr",
          "May",
          "Jun",
          "Jul",
          "Aug",
          "Sep",
          "Oct",
          "Nov",
          "Dec",
        ];
        const day = String(date.getDate()).padStart(2, "0");
        const month = months[date.getMonth()];
        return `${day} ${month}`;
      }

      // City filters + itinerary
      const citySet = Array.from(
        new Set(CONFIG.data.itinerary.map((x) => x.city)),
      ).filter((x) => x);
      let cityFilter = new Set(citySet);

      function renderCityFilters() {
        const holder = document.getElementById("cityFilters");
        holder.innerHTML = "";
        for (const c of citySet) {
          const b = document.createElement("button");
          b.className = "pill";
          b.textContent = c;
          b.dataset.on = "true";
          b.addEventListener("click", () => {
            if (cityFilter.has(c)) cityFilter.delete(c);
            else cityFilter.add(c);
            b.dataset.on = cityFilter.has(c) ? "true" : "false";
            renderItinerary();
          });
          holder.appendChild(b);
        }
      }

      function renderItinerary() {
        const q = (document.getElementById("itSearch").value || "")
          .toLowerCase()
          .trim();
        const grid = document.getElementById("itineraryGrid");
        grid.innerHTML = "";
        const items = CONFIG.data.itinerary.filter((d) =>
          cityFilter.has(d.city),
        );

        for (const d of items) {
          const hay = (
            d.title +
            " " +
            d.city +
            " " +
            d.logistics +
            " " +
            (d.tags || []).join(" ") +
            " " +
            discussionText(d.discussion_points)
          ).toLowerCase();
          if (q && !hay.includes(q)) continue;

          const dateFormatted = formatDate(d.date);

          const wrap = document.createElement("div");
          wrap.className = "day";
          wrap.dataset.open = "false";

          const top = document.createElement("div");
          top.className = "dayTop";
          top.addEventListener("click", () => {
            wrap.dataset.open = wrap.dataset.open === "true" ? "false" : "true";
          });

          const badge = document.createElement("div");
          badge.className = "badgeDate";
          badge.innerHTML = `<div class="d">${dateFormatted}</div><div class="c">${d.city}</div>`;

          const main = document.createElement("div");
          main.className = "dayMain";
          main.innerHTML = `<div class="t">${escapeHtml(d.title)}</div>${d.theme ? `<div class="theme">${escapeHtml(d.theme)}</div>` : ''}`;

          if (d.logistics) {
            const logDiv = document.createElement("div");
            logDiv.className = "logistics";
            logDiv.textContent = d.logistics;
            main.appendChild(logDiv);
          }

          const tagrow = document.createElement("div");
          tagrow.className = "tagrow";
          for (const t of d.tags || []) {
            const tag = document.createElement("div");
            tag.className = "tag";
            tag.innerHTML = `${iconFor(t)}<span>${t}</span>`;
            tagrow.appendChild(tag);
          }
          main.appendChild(tagrow);

          const body = document.createElement("div");
          body.className = "dayBody";
          const kv = document.createElement("div");
          kv.className = "kv";
          kv.innerHTML = `
      <div class="k"><span>Date</span>${d.date}</div>
      <div class="k"><span>City</span>${d.city}</div>
    `;
          body.appendChild(kv);

          if (d.morning_summary || d.afternoon_summary || d.evening_summary) {
            const summariesDiv = document.createElement("div");
            summariesDiv.style.marginTop = "16px";
            summariesDiv.style.display = "grid";
            summariesDiv.style.gap = "12px";

            const renderSummary = (title, items) => {
              if (!items || !items.length) return "";
              return `<div class="summary-period" style="background: var(--surface); padding: 11px 13px; border-radius: 12px; border: 1px solid var(--border);">
          <strong style="display: block; color: var(--text); margin-bottom: 6px; font: 600 12px/1 Inter,system-ui,sans-serif; text-transform: uppercase; letter-spacing: 0.4px;">${title}</strong>
          <ul style="margin: 0; padding-left: 18px; font: 400 13px/1.55 Inter,system-ui,sans-serif; color: var(--text-secondary);">
            ${items.map((i) => `<li>${linkifyCompanies(i)}</li>`).join("")}
          </ul>
        </div>`;
            };

            summariesDiv.innerHTML = `
        ${renderSummary("Morning", d.morning_summary)}
        ${renderSummary("Afternoon", d.afternoon_summary)}
        ${renderSummary("Evening", d.evening_summary)}
      `;
            body.appendChild(summariesDiv);
          }

          const discussionHtml = renderDiscussion(d.discussion_points);
          if (discussionHtml) {
            const discussionDiv = document.createElement("div");
            discussionDiv.innerHTML = discussionHtml;
            body.appendChild(discussionDiv);
          }

          wrap.appendChild(top);
          top.appendChild(badge);
          top.appendChild(main);
          wrap.appendChild(body);
          grid.appendChild(wrap);
        }
      }
      document
        .getElementById("itSearch")
        .addEventListener("input", renderItinerary);

      // Companies
      function renderCompanies() {
        const q = (document.getElementById("coSearch").value || "")
          .toLowerCase()
          .trim();
        const holder = document.getElementById("companyCards");
        holder.innerHTML = "";
        
        const sgCityData = CONFIG.data.cities.find(c => c.name === "Singapore");
        const sgCompanies = sgCityData ? sgCityData.companies : [];

        for (const c of CONFIG.data.companies) {
          const hay = (c.name + " " + c.intro + " " + c.why).toLowerCase();
          if (q && !hay.includes(q)) continue;
          
          const isSg = sgCompanies.includes(c.name);
          const card = document.createElement("div");
          card.className = "card";
          card.id = 'co-' + slugify(c.name);
          
          const meetingHtml = c.meeting
            ? `<span style="display:inline-flex;align-items:center;gap:4px;"><span style="font:600 10px/1 Inter,system-ui,sans-serif;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-secondary);">Date</span> ${escapeHtml(c.meeting)}</span>`
            : "";
          const linkHtml = c.link
            ? `<span><a href="${escapeHtml(c.link)}" target="_blank" style="color: var(--primary); text-decoration: none; font-weight:600;">↗ Website</a></span>`
            : "";
          const metaHtml = (c.meeting || c.link)
            ? `<div style="margin-top: 12px; display: flex; gap: 16px; font-size: 12px; color: var(--text-secondary); align-items: center; flex-wrap: wrap;">${meetingHtml}${linkHtml}</div>`
            : "";
          const addressHtml = c.address ? `<div style="margin-top: 6px; font-size: 12px; color: var(--text-secondary);"><span style="font:600 10px/1 Inter,system-ui,sans-serif;text-transform:uppercase;letter-spacing:0.4px;margin-right:4px;">Location</span>${escapeHtml(c.address)}</div>` : "";
          
          card.innerHTML = `
      <h3>${escapeHtml(c.name)}</h3>
      <p>${escapeHtml(c.intro)}</p>
      <div class="why">${escapeHtml(c.why)}</div>
      ${addressHtml}
      ${metaHtml}
    `;
          holder.appendChild(card);
        }
      }
      document
        .getElementById("coSearch")
        .addEventListener("input", renderCompanies);

      // Cities
      function renderCities() {
        const q = (document.getElementById("ciSearch").value || "")
          .toLowerCase()
          .trim();
        const holder = document.getElementById("cityCards");
        holder.innerHTML = "";
        for (const c of CONFIG.data.cities) {
          const hay = (
            c.name +
            " " +
            c.description +
            " " +
            c.history
          ).toLowerCase();
          if (q && !hay.includes(q)) continue;

          const card = document.createElement("div");
          card.className = "card";

          const listToHtml = (items) => {
            if (!items || items.length === 0) return "";
            return `<ul style="margin: 4px 0 0; padding-left: 20px; font-size: 13px; line-height: 1.5; color: var(--text-secondary);">
        ${items.map((i) => `<li>${escapeHtml(i)}</li>`).join("")}
      </ul>`;
          };

          const guideSection = (label, text) => text
            ? `<div style="margin-top: 10px; padding: 10px 12px 10px 11px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--primary);">
                <strong style="display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--primary); margin-bottom:4px;">${label}</strong>
                <span style="font-size:13px; line-height:1.55; color:var(--text-secondary);">${escapeHtml(text)}</span>
               </div>`
            : '';

          card.innerHTML = `
      <h3>${escapeHtml(c.name)}</h3>
      <p style="font-weight: 600; color: var(--text);">${escapeHtml(c.description)}</p>
      <p>${escapeHtml(c.history)}</p>

      ${c.companies && c.companies.length ? `<div style="margin-top: 14px;">
        <strong style="font-size: 13px; color: var(--text);">Companies Meeting Here:</strong>
        ${listToHtml(c.companies)}
      </div>` : ''}

      ${c.see ? `<div style="margin-top: 14px;"><strong style="font-size: 13px; color: var(--text);">City Guide</strong></div>
        ${guideSection('Must See', c.see)}
        ${guideSection('Must Taste', c.taste)}
        ${guideSection('Must Buy', c.buy)}
        ${guideSection('Must Experience', c.experience)}` : `
      <div style="margin-top: 10px;">
        <strong style="font-size: 13px; color: var(--text);">Top Attractions:</strong>
        ${listToHtml(c.attractions)}
      </div>
      <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">
        <strong style="font-size: 13px; color: var(--text);">General Tips:</strong>
        ${listToHtml(c.tips)}
      </div>`}
    `;
          holder.appendChild(card);
        }
      }
      document
        .getElementById("ciSearch")
        .addEventListener("input", renderCities);

      // Logistics
      function table(elId, headers, rows) {
        const el = document.getElementById(elId);
        const thead = `<tr>${headers.map((h) => `<th>${h}</th>`).join("")}</tr>`;
        const tbody = rows
          .map(
            (r) =>
              `<tr>${r.map((x) => `<td>${escapeHtml(String(x ?? ""))}</td>`).join("")}</tr>`,
          )
          .join("");
        el.innerHTML = thead + tbody;
      }
      function escapeHtml(s) {
        return s
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function renderLogistics() {
        table(
          "flightTable",
          ["Date", "From", "To", "Carrier", "Flight", "Time"],
          CONFIG.data.flights.map((f) => [
            f.date,
            f.from,
            f.to,
            f.carrier,
            f.flight,
            f.time,
          ]),
        );
        if (CONFIG.data.rail.length > 0) {
          document.getElementById("railSection").style.display = "";
          table(
            "railTable",
            ["Date", "From", "To", "Service", "Time", "Ref"],
            CONFIG.data.rail.map((r) => [r.date, r.from, r.to, r.service, r.time, r.ref]),
          );
        }
        table("hotelTable", ["City", "Hotel", "Address", "Check-in", "Check-out"], CONFIG.data.hotels.map((h) => {
          const name = h.chineseName ? `${h.hotel} · ${h.chineseName}` : h.hotel;
          return [h.city, name, h.address || "—", h.checkin || "—", h.checkout || "—"];
        }));
      }

      // Init
      renderCityFilters();
      renderItinerary();
      renderCompanies();
      renderCities();
      renderLogistics();

      // PWA Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(registration => {
            console.log('ServiceWorker registration successful with scope: ', registration.scope);
          }).catch(err => {
            console.log('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
